version: '3.9'

services:
  # ─── Databases ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: cs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contractsense}
      POSTGRES_USER: ${POSTGRES_USER:-cs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cs_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: cs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-cs_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-cs_password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-contractsense}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: cs_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cs_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Core API ───────────────────────────────────────────────────────────────

  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    container_name: cs_core_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cs_user}:${POSTGRES_PASSWORD:-cs_password}@postgres:5432/${POSTGRES_DB:-contractsense}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: contracts
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CORS_ORIGINS: http://localhost
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET:-change_me_internal_secret}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── AI Backend ─────────────────────────────────────────────────────────────

  ai-api:
    build:
      context: apps/ai-backend
      dockerfile: Dockerfile
      target: api
    container_name: cs_ai_api
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-cs_user}:${MONGO_INITDB_ROOT_PASSWORD:-cs_password}@mongo:27017/${MONGO_INITDB_DATABASE:-contractsense}?authSource=admin
      REDIS_URL: redis://redis:6379
      CORE_API_CALLBACK_URL: http://core-api:4000/api/core/contracts
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET:-change_me_internal_secret}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: contracts
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    build:
      context: apps/ai-backend
      dockerfile: Dockerfile
      target: worker
    container_name: cs_ai_worker
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-cs_user}:${MONGO_INITDB_ROOT_PASSWORD:-cs_password}@mongo:27017/${MONGO_INITDB_DATABASE:-contractsense}?authSource=admin
      REDIS_URL: redis://redis:6379
      CORE_API_CALLBACK_URL: http://core-api:4000/api/core/contracts
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET:-change_me_internal_secret}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: contracts
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  flower:
    build:
      context: apps/ai-backend
      dockerfile: Dockerfile
      target: worker
    container_name: cs_flower
    restart: unless-stopped
    command: celery -A app.worker.celery_app flower --port=5555 --broker=redis://redis:6379
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ─── Frontend ───────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cs_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/core
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost
    depends_on:
      - core-api

  # ─── Nginx ──────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: cs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - core-api
      - ai-api

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
