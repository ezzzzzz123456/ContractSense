events {
  worker_connections 1024;
}

http {
  # ─── Upstreams ──────────────────────────────────────────────────────────────
  upstream web {
    server web:3000;
  }

  upstream core_api {
    server core-api:4000;
  }

  upstream ai_api {
    server ai-api:8000;
  }

  # ─── Rate Limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

  # ─── Main Server ────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name localhost;

    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Core API ─────────────────────────────────────────────────────────────
    location /api/core/ {
      limit_req zone=api burst=10 nodelay;

      proxy_pass http://core_api/api/core/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Stripe webhook needs raw body
      proxy_request_buffering off;
    }

    # Upload endpoint — stricter rate limit
    location /api/core/contracts/upload {
      limit_req zone=upload burst=2 nodelay;

      proxy_pass http://core_api/api/core/contracts/upload;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 60s;
    }

    # ── AI Backend ───────────────────────────────────────────────────────────
    location /api/ai/ {
      limit_req zone=api burst=5 nodelay;

      proxy_pass http://ai_api/api/ai/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    # ── Frontend (Next.js) ───────────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://web/_next/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 30s;
    }

    # ── Health ───────────────────────────────────────────────────────────────
    location /nginx-health {
      return 200 'OK';
      add_header Content-Type text/plain;
    }
  }
}
